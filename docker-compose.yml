services:
  loiter:
    image: java-loiter:latest
    build:
      context: ./loiter/src
      dockerfile: Dockerfile
  memory-monitor:
    image: java-memory-monitor:latest
    build:
      context: .
      dockerfile: Dockerfile
    pid: service:loiter
    command:
      - --dump-interval
      - "10"
      - --no-heap-dumps
      - --mapped-files
      - --baseline
      - --limit
      - "300"
      - --cleanup-interval
      - "30"
    restart: no
    
